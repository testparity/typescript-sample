name: Parity Sample

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  parity:
    name: Install and run Parity
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP for Parity
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, fileinfo, json

      - name: Install Parity
        run: |
          composer global require testparity/parity --prefer-dist --no-progress --no-interaction
          echo "$HOME/.composer/vendor/bin" >> "$GITHUB_PATH"

      - name: Run Parity
        run: parity check --config=parity.yaml --format=json

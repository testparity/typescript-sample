settings:
  namespace_roots:
    src: Src
    tests: Tests
  source_extension: ".ts"
  test_suffix: ".test"
  test_extension: ".ts"
  namespace_separator: "."

coverage_xml: coverage-xml
min_coverage: 70
min_coverage_global: 80
min_matched_coverage: 40

structure:
  - name: "Vite Utilities"
    paths:
      source: "src"
      test: "tests"
    rules:
      - minimum-coverage:
          min: 70
      - matched-coverage:
          min: 40
